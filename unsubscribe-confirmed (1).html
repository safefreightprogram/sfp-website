<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribed – Safe Freight Program</title>
  <meta name="robots" content="noindex" />

  <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16x16.png?v=2">
  <link rel="manifest" href="/public/site.webmanifest?v=2">
  <link rel="mask-icon" href="/public/safari-pinned-tab.svg?v=2" color="#1e40af">
  <meta name="msapplication-TileColor" content="#1e40af">
  <meta name="theme-color" content="#ffffff">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp   { animation: fadeInUp 0.5s ease-out both; }
    .animate-fadeInUp-2 { animation: fadeInUp 0.5s ease-out 0.12s both; }
    .animate-fadeInUp-3 { animation: fadeInUp 0.5s ease-out 0.22s both; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <div id="header-placeholder"></div>

  <main class="max-w-4xl mx-auto px-4 py-8 md:py-14">

    <!-- Rule + category label -->
    <div class="animate-fadeInUp">
      <div class="w-8 h-0.5 bg-gray-400 mb-4"></div>
      <p class="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-6">
        Safe Freight Intel — Subscription
      </p>
    </div>

    <!-- Primary directive -->
    <div class="animate-fadeInUp-2 max-w-2xl mb-8">
      <h1 id="headline" class="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight leading-tight mb-6">
        You've been<br>unsubscribed.
      </h1>
      <p id="subhead" class="text-base md:text-lg text-gray-600 leading-relaxed">
        You won't receive any further emails from us.
      </p>
    </div>

    <!-- What was removed — shown if segment param present -->
    <div id="removed-block" class="hidden animate-fadeInUp-2 mb-10">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Removed from</p>
      <div id="removed-list" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Thin rule + actions -->
    <div class="animate-fadeInUp-3 max-w-2xl">
      <div class="border-t border-gray-200 pt-6">

        <p class="text-sm text-gray-400 mb-6">
          Changed your mind? You can resubscribe at any time.
        </p>

        <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm">
          <a href="/subscribe.html"
             class="text-blue-700 hover:text-blue-900 hover:underline transition-colors">
            Resubscribe
          </a>
          <a href="/index.html"
             class="text-gray-400 hover:text-gray-600 hover:underline transition-colors">
            Back to home
          </a>
        </div>

      </div>
    </div>

  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/js/sfp-auth.js"></script>
  <script type="module" src="/js/sfp-api.js"></script>
  <script src="/js/sfp-gas-fetch-patch.js"></script>
  <script src="/js/sfp-config.js"></script>
  <script src="/js/load-header-footer.js" defer></script>
  <script src="/js/account-indicator.js" defer></script>
  <script src="/js/role-guards.js" defer></script>
  <script src="/js/menu-enhance.js" defer></script>

  <script>
  (function () {
    var params  = new URLSearchParams(window.location.search);
    var segment = (params.get('segment') || '').trim().toLowerCase();
    var email   = (params.get('email')   || '').trim();

    // ── Segment-aware headline + subhead ─────────────────────────────
    var SEGMENT_LABELS = {
      'pro':    'CoR Intel Weekly',
      'driver': 'Safe Freight Mate',
      'all':    null  // handled separately
    };

    var headlineEl = document.getElementById('headline');
    var subheadEl  = document.getElementById('subhead');

    // Subhead — include email if present
    var addressText = email ? ' at ' + email : '';

    if (segment === 'all' || !segment) {
      // Unsubscribed from everything
      headlineEl.innerHTML = "You've been<br>unsubscribed.";
      subheadEl.textContent = "You've been removed from all Safe Freight Intel lists" + addressText + ". You won't receive any further emails from us.";
    } else if (SEGMENT_LABELS[segment]) {
      var label = SEGMENT_LABELS[segment];
      headlineEl.innerHTML = "You've been<br>unsubscribed.";
      subheadEl.textContent = "You've been removed from " + label + addressText + ". You won't receive any further editions of this newsletter.";
    }

    // ── Removed-from pills ────────────────────────────────────────────
    var PILL_INFO = {
      'pro': {
        name: 'CoR Intel Weekly',
        icon: '<svg class="h-3.5 w-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="3" x2="12" y2="20"/><line x1="6" y1="20" x2="18" y2="20"/><line x1="4" y1="7" x2="20" y2="7"/><path d="M4 7 L2 13 Q4 15 6 13 L4 7"/><path d="M20 7 L18 13 Q20 15 22 13 L20 7"/></svg>'
      },
      'driver': {
        name: 'Safe Freight Mate',
        icon: '<svg class="h-3.5 w-3.5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="10" x2="12" y2="3"/><line x1="13.7" y1="13.7" x2="18.4" y2="18.4"/><line x1="10.3" y1="13.7" x2="5.6" y2="18.4"/></svg>'
      }
    };

    var removedList  = document.getElementById('removed-list');
    var removedBlock = document.getElementById('removed-block');

    // Determine which pills to show
    var pillsToShow = [];
    if (segment === 'all') {
      pillsToShow = ['pro', 'driver'];
    } else if (PILL_INFO[segment]) {
      pillsToShow = [segment];
    }

    pillsToShow.forEach(function (seg) {
      var info = PILL_INFO[seg];
      var pill = document.createElement('div');
      // Muted grey style — removed, not active
      pill.className = 'inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-xs font-medium text-gray-500';
      pill.innerHTML = info.icon + '<span>' + info.name + '</span>';
      removedList.appendChild(pill);
    });

    if (removedList.children.length > 0) {
      removedBlock.classList.remove('hidden');
    }

  })();
  </script>

</body>
</html>
