<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe to Safe Freight Intel – Safe Freight Program</title>

  <!-- Updated Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/public/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="/public/favicon-16x16.png?v=2">
  <link rel="manifest" href="/public/site.webmanifest?v=2">
  <link rel="mask-icon" href="/public/safari-pinned-tab.svg?v=2" color="#1e40af">
  <meta name="msapplication-TileColor" content="#1e40af">
  <meta name="theme-color" content="#ffffff">

  <script src="https://cdn.tailwindcss.com"></script>

  <meta name="description" content="Stay informed with CoR Intel Weekly for professionals and Safe Freight Mate for drivers. Up to date analysis of regulatory changes, enforcement trends, and industry developments." />
  <meta property="og:title" content="Safe Freight Intel Newsletter" />
  <meta property="og:description" content="Professional compliance intelligence for Australia's freight industry" />

  <style>
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(20px);} 100% { opacity: 1; transform: translateY(0);} }
    .animate-fadeInUp { animation: fadeInUp 0.6s ease-out both; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Injected Header -->
  <div id="header-placeholder"></div>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-6">

    <!-- Page Header -->
    <section class="mb-8">
      <p class="text-xs font-semibold tracking-wider text-gray-500 uppercase mb-2">
        Newsletter
      </p>
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">
        Safe Freight Intel
      </h1>
      <p class="text-gray-600 max-w-2xl">
        Weekly regulatory intelligence for professionals and drivers across Australia's freight industry.
      </p>
    </section>

    <!-- Subscription Form Card -->
    <section class="max-w-2xl animate-fadeInUp">
      <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">

        <h2 class="text-lg font-semibold text-gray-900 mb-6">Subscribe</h2>

        <!-- Error/success message box -->
        <div id="form-messages" class="hidden mb-4 rounded-lg p-4"></div>

        <form id="newsletter-form" novalidate>

          <!-- Name -->
          <div class="mb-4">
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" autocomplete="name"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Your name">
          </div>

          <!-- Email -->
          <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
            <input type="email" id="email" name="email" required autocomplete="email"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="you@example.com">
          </div>

          <!-- Company -->
          <div class="mb-4">
            <label for="company" class="block text-sm font-medium text-gray-700 mb-1">Company</label>
            <input type="text" id="company" name="company"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Your company or organisation">
          </div>

          <!-- Role -->
          <div class="mb-6">
            <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <select id="role" name="role"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select your role…</option>
              <option value="driver">Driver</option>
              <option value="operator">Operator / Fleet Manager</option>
              <option value="scheduler">Scheduler / Planner</option>
              <option value="loader">Loader / Consignor</option>
              <option value="manager">Safety / Compliance Manager</option>
              <option value="regulator">Regulator / Government</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Segments -->
          <fieldset class="mb-6">
            <legend class="block text-sm font-medium text-gray-700 mb-2">
              Newsletters <span class="text-red-500">*</span>
            </legend>
            <div class="space-y-2">
              <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" name="segments[]" value="cor-intel-weekly"
                  class="mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span>
                  <span class="block text-sm font-medium text-gray-800">CoR Intel Weekly</span>
                  <span class="block text-xs text-gray-500">Regulatory analysis and enforcement trends for professionals</span>
                </span>
              </label>
              <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" name="segments[]" value="safe-freight-mate"
                  class="mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <span>
                  <span class="block text-sm font-medium text-gray-800">Safe Freight Mate</span>
                  <span class="block text-xs text-gray-500">Plain-language compliance updates for drivers</span>
                </span>
              </label>
            </div>
            <p id="segment-error" class="hidden mt-2 text-sm text-red-600">Please select at least one newsletter.</p>
          </fieldset>

          <!-- Consent -->
          <div class="mb-6">
            <label class="flex items-start gap-3 cursor-pointer">
              <input type="checkbox" id="consent" name="consent"
                class="mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
              <span class="text-sm text-gray-600">
                I agree to receive emails from the Safe Freight Program. I can unsubscribe at any time.
              </span>
            </label>
          </div>

          <button type="submit" id="submit-btn"
            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Subscribe Now
          </button>

        </form>
      </div>
    </section>

  </main>

  <!-- Injected Footer -->
  <div id="footer-placeholder"></div>

  <!-- Global scripts — same order as index.html -->
  <script type="module" src="/js/sfp-auth.js"></script>
  <script type="module" src="/js/sfp-api.js"></script>
  <script src="/js/sfp-gas-fetch-patch.js"></script>
  <script src="/js/sfp-config.js"></script>
  <script src="/js/load-header-footer.js" defer></script>
  <script src="/js/account-indicator.js" defer></script>
  <script src="/js/role-guards.js" defer></script>
  <script src="/js/menu-enhance.js" defer></script>

  <script>
  // Handle error messages from URL parameters
  window.addEventListener('DOMContentLoaded', function () {
    var urlParams = new URLSearchParams(window.location.search);
    var error = urlParams.get('error');

    if (error) {
      var errorDiv = document.createElement('div');
      errorDiv.className = 'bg-red-50 border border-red-200 rounded-lg p-4 mb-6';
      errorDiv.innerHTML =
        '<div class="flex">' +
          '<svg class="w-5 h-5 text-red-600 mr-3 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">' +
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />' +
          '</svg>' +
          '<p class="text-red-700">' + decodeURIComponent(error) + '</p>' +
        '</div>';
      var form = document.getElementById('newsletter-form');
      if (form && form.parentNode) form.parentNode.insertBefore(errorDiv, form);
    }

    document.querySelectorAll('input[name="segments[]"]').forEach(function (cb) {
      cb.addEventListener('change', function () {
        if (document.querySelectorAll('input[name="segments[]"]:checked').length > 0) {
          document.getElementById('segment-error').classList.add('hidden');
        }
      });
    });
  });
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var form = document.getElementById('newsletter-form');
    if (!form) return;

    var btn    = document.getElementById('submit-btn');
    var msgBox = document.getElementById('form-messages');

    var API_BASE_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : 'https://sfp-newsletter-automation-production.up.railway.app';

    function showMessage(type, text) {
      if (!msgBox) return;
      msgBox.className = 'rounded-lg p-4 ' +
        (type === 'error'
          ? 'bg-red-50 border border-red-200 text-red-800'
          : 'bg-green-50 border border-green-200 text-green-800');
      msgBox.textContent = text;
      msgBox.classList.remove('hidden');
    }

    function lockBtn()   { if (btn) { btn.disabled = true;  btn.textContent = 'Submitting…';  } }
    function unlockBtn() { if (btn) { btn.disabled = false; btn.textContent = 'Subscribe Now'; } }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      var checked = document.querySelectorAll('input[name="segments[]"]:checked');
      if (checked.length === 0) {
        var el = document.getElementById('segment-error');
        if (el) el.classList.remove('hidden');
        return;
      }

      var email    = document.getElementById('email')?.value?.trim();
      var name     = document.getElementById('name')?.value?.trim();
      var company  = document.getElementById('company')?.value?.trim();
      var role     = document.getElementById('role')?.value;
      var consent  = document.getElementById('consent')?.checked;
      var segments = Array.from(checked).map(function (el) { return el.value; });

      if (!email)   { showMessage('error', 'Email is required.');   return; }
      if (!consent) { showMessage('error', 'Consent is required.'); return; }

      lockBtn();

      try {
        var response = await fetch(API_BASE_URL + '/api/subscribers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, name: name, company: company, role: role, segments: segments })
        });

        var data = await response.json().catch(function () { return {}; });

        if (!response.ok) {
          showMessage('error', data.error || 'Subscription failed.');
          unlockBtn();
          return;
        }

        var msg = (data.message || '').toString().trim();
        var serverSegments = (data.data && data.data.segments)
          ? String(data.data.segments)
          : segments.join(',');

        if (msg === 'Subscriber created (pending) — confirmation email sent') {
          window.location.href =
            '/subscribe-pending.html?email=' + encodeURIComponent(email) +
            '&segments=' + encodeURIComponent(segments.join(','));
        } else {
          var mode = 'updated';
          if (msg === 'Subscriber already subscribed to selected list(s)') mode = 'already';
          if (msg === 'Subscription reactivated successfully') mode = 'reactivated';
          window.location.href =
            '/subscribe-confirmed.html?email=' + encodeURIComponent(email) +
            '&segments=' + encodeURIComponent(serverSegments) +
            '&mode=' + encodeURIComponent(mode);
        }

      } catch (err) {
        showMessage('error', 'Network error. Please try again.');
        unlockBtn();
      }
    });
  });
  </script>

</body>
</html>
